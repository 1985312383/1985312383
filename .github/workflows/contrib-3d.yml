name: Generate 3D Contribution

on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate 3D contribution chart
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: 1985312383

      - name: Build monochrome season variants
        shell: bash
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          source = Path('profile-3d-contrib/profile-season-animate.svg')
          if not source.exists():
              raise SystemExit('profile-season-animate.svg was not generated')

          svg = source.read_text(encoding='utf-8')
          pattern = re.compile(r'#[0-9a-fA-F]{6}')
          colors = []
          seen = set()
          for m in pattern.finditer(svg):
              c = m.group(0).lower()
              if c not in seen:
                  seen.add(c)
                  colors.append(c)

          def luminance(hex_color: str) -> float:
              r = int(hex_color[1:3], 16)
              g = int(hex_color[3:5], 16)
              b = int(hex_color[5:7], 16)
              return 0.2126 * r + 0.7152 * g + 0.0722 * b

          ordered = sorted(colors, key=luminance)
          light_palette = ['#ffffff', '#f3f4f6', '#e5e7eb', '#d1d5db', '#9ca3af', '#6b7280', '#374151', '#111827']
          dark_palette = ['#020617', '#0f172a', '#1f2937', '#334155', '#475569', '#94a3b8', '#cbd5e1', '#f8fafc']

          def build_variant(palette):
              mapping = {}
              if not ordered:
                  return svg
              for idx, color in enumerate(ordered):
                  bucket = round(idx * (len(palette) - 1) / max(len(ordered) - 1, 1))
                  mapping[color] = palette[bucket]
              out = svg
              for old, new in sorted(mapping.items(), key=lambda x: len(x[0]), reverse=True):
                  out = out.replace(old, new)
              return out

          Path('profile-3d-contrib/profile-season-animate-light.svg').write_text(build_variant(light_palette), encoding='utf-8')
          Path('profile-3d-contrib/profile-season-animate-dark.svg').write_text(build_variant(dark_palette), encoding='utf-8')
          PY

      - name: Publish 3D contribution to output branch
        shell: bash
        run: |
          if [ ! -d profile-3d-contrib ]; then
            echo "profile-3d-contrib was not generated, skipping publish"
            exit 0
          fi

          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin output || true

          if git ls-remote --exit-code --heads origin output >/dev/null 2>&1; then
            git worktree add .output origin/output
          else
            git worktree add --detach .output
            cd .output
            git switch --orphan output
            git rm -rf . >/dev/null 2>&1 || true
            cd ..
          fi

          rm -rf .output/profile-3d-contrib
          mkdir -p .output/profile-3d-contrib
          cp -r profile-3d-contrib/. .output/profile-3d-contrib/

          cd .output
          git add profile-3d-contrib
          git diff --cached --quiet && exit 0
          git commit -m "chore: update 3d contribution chart"

          for attempt in 1 2 3; do
            git pull --rebase origin output || git rebase --abort || true
            if git push origin HEAD:output; then
              exit 0
            fi
            sleep 5
          done

          exit 1
