name: Generate 3D Contribution

on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate 3D contribution chart
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: 1985312383

      - name: Publish 3D contribution to output branch
        shell: bash
        run: |
          if [ ! -d profile-3d-contrib ]; then
            echo "profile-3d-contrib was not generated, skipping publish"
            exit 0
          fi

          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin output || true

          if git ls-remote --exit-code --heads origin output >/dev/null 2>&1; then
            git worktree add .output origin/output
          else
            git worktree add --detach .output
            cd .output
            git switch --orphan output
            git rm -rf . >/dev/null 2>&1 || true
            cd ..
          fi

          rm -rf .output/profile-3d-contrib
          mkdir -p .output/profile-3d-contrib
          cp -r profile-3d-contrib/. .output/profile-3d-contrib/

          cd .output
          git add profile-3d-contrib
          git diff --cached --quiet && exit 0
          git commit -m "chore: update 3d contribution chart"

          for attempt in 1 2 3; do
            git pull --rebase origin output || git rebase --abort || true
            if git push origin HEAD:output; then
              exit 0
            fi
            sleep 5
          done

          exit 1
