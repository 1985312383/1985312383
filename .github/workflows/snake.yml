name: Generate Snake

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate contribution snake
        uses: Platane/snk@v3
        with:
          github_user_name: 1985312383
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Publish snake to output branch
        shell: bash
        run: |
          if [ ! -f dist/github-contribution-grid-snake-dark.svg ]; then
            echo "snake assets were not generated, skipping publish"
            exit 0
          fi

          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin output || true

          if git ls-remote --exit-code --heads origin output >/dev/null 2>&1; then
            git worktree add .output origin/output
          else
            git worktree add --detach .output
            cd .output
            git switch --orphan output
            git rm -rf . >/dev/null 2>&1 || true
            cd ..
          fi

          cp dist/github-contribution-grid-snake.svg .output/github-contribution-grid-snake.svg
          cp dist/github-contribution-grid-snake-dark.svg .output/github-contribution-grid-snake-dark.svg

          cd .output
          git add github-contribution-grid-snake.svg github-contribution-grid-snake-dark.svg
          git diff --cached --quiet && exit 0
          git commit -m "chore: update snake animation"

          for attempt in 1 2 3; do
            git pull --rebase origin output || git rebase --abort || true
            if git push origin HEAD:output; then
              exit 0
            fi
            sleep 5
          done

          exit 1
